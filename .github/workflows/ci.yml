name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  _PAPERSCOUT_TESTING: "1"
  SLACK_BOT_TOKEN: xoxb-ci-placeholder
  SLACK_SIGNING_SECRET: ci-placeholder-secret

jobs:
  lockfile:
    name: Lockfile (uv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lockfile

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests with coverage
        run: |
          uv run python -m pytest tests/ \
            --cov=paperscout \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            -v

      - name: Write coverage summary
        if: always()
        run: uv run python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  benchmark:
    name: Probe cycle benchmark (regression)
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run probe benchmark (mock HTTP)
        run: uv run pytest benchmarks/ -m benchmark -v --tb=short
