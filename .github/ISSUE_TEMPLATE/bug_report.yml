name: Bug report
description: File a bug report to help us improve paperscout
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        **Do not** use this form for security vulnerabilities — follow **[SECURITY.md](../SECURITY.md)** (private reporting).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one short paragraph?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can a maintainer reproduce the issue?
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git SHA or release tag, if known
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Docker vs bare metal, etc.
    validations:
      required: false
